services:
  jenkins:
    build: .
    container_name: jenkins
    ports:
      - "8080:8080"
    volumes:
      - jenkins_home:/var/jenkins_home:Z
    restart: unless-stopped

# Use existing named volume (no project-prefix auto-create)
volumes:
  jenkins_home:
    external: true
    name: ${JENKINS_VOLUME_NAME:-jenkins_home}
